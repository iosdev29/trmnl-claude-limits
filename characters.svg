<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" shape-rendering="crispEdges">
  <defs>
    <!-- Checkerboard pattern to simulate transparent PNG look -->
    <pattern id="checker" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#B8B8B8"/>
      <rect width="12" height="12" fill="#A8A8A8"/>
      <rect x="12" y="12" width="12" height="12" fill="#A8A8A8"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="1500" height="1000" fill="#ffffff"/>

  <!-- ============================================= -->
  <!-- TOP-LEFT: HAPPY character with arms raised    -->
  <!-- ============================================= -->
  <g id="happy">
    <!-- Left arm (raised) -->
    <rect x="170" y="120" width="36" height="24" fill="url(#checker)"/>
    <rect x="182" y="96" width="24" height="24" fill="url(#checker)"/>
    <rect x="194" y="120" width="24" height="60" fill="url(#checker)"/>
    <!-- Right arm (raised) -->
    <rect x="618" y="120" width="36" height="24" fill="url(#checker)"/>
    <rect x="618" y="96" width="24" height="24" fill="url(#checker)"/>
    <rect x="606" y="120" width="24" height="60" fill="url(#checker)"/>
    <!-- Main body -->
    <rect x="218" y="60" width="388" height="300" fill="url(#checker)"/>
    <!-- Legs -->
    <rect x="266" y="360" width="60" height="48" fill="url(#checker)"/>
    <rect x="498" y="360" width="60" height="48" fill="url(#checker)"/>

    <!-- Face: closed happy eyes (^^) -->
    <!-- Left eye -->
    <rect x="290" y="150" width="12" height="12" fill="#000"/>
    <rect x="302" y="138" width="12" height="12" fill="#000"/>
    <rect x="314" y="138" width="12" height="12" fill="#000"/>
    <rect x="326" y="138" width="12" height="12" fill="#000"/>
    <rect x="338" y="150" width="12" height="12" fill="#000"/>

    <!-- Right eye -->
    <rect x="482" y="150" width="12" height="12" fill="#000"/>
    <rect x="494" y="138" width="12" height="12" fill="#000"/>
    <rect x="506" y="138" width="12" height="12" fill="#000"/>
    <rect x="518" y="138" width="12" height="12" fill="#000"/>
    <rect x="530" y="150" width="12" height="12" fill="#000"/>

    <!-- Smile -->
    <rect x="374" y="222" width="72" height="12" fill="#000"/>
    <rect x="362" y="210" width="12" height="12" fill="#000"/>
    <rect x="446" y="210" width="12" height="12" fill="#000"/>
    <rect x="374" y="234" width="72" height="12" fill="#fff"/>
    <rect x="386" y="234" width="48" height="24" fill="#fff"/>
    <rect x="386" y="246" width="12" height="12" fill="#000"/>
    <rect x="422" y="246" width="12" height="12" fill="#000"/>
    <rect x="398" y="258" width="24" height="12" fill="#000"/>
    <rect x="386" y="246" width="48" height="12" fill="#fff"/>
    <rect x="374" y="234" width="12" height="12" fill="#000"/>
    <rect x="434" y="234" width="12" height="12" fill="#000"/>
  </g>

  <!-- ============================================= -->
  <!-- TOP-RIGHT: NEUTRAL character                  -->
  <!-- ============================================= -->
  <g id="neutral">
    <!-- Main body -->
    <rect x="854" y="108" width="472" height="288" fill="url(#checker)"/>
    <!-- Small arm bumps -->
    <rect x="830" y="252" width="24" height="72" fill="url(#checker)"/>
    <rect x="1326" y="252" width="24" height="72" fill="url(#checker)"/>
    <!-- Legs -->
    <rect x="902" y="396" width="60" height="48" fill="url(#checker)"/>
    <rect x="1218" y="396" width="60" height="48" fill="url(#checker)"/>

    <!-- Square eyes -->
    <rect x="962" y="180" width="60" height="60" fill="#000"/>
    <rect x="1158" y="180" width="60" height="60" fill="#000"/>

    <!-- Small mouth -->
    <rect x="1074" y="288" width="36" height="12" fill="#000"/>
  </g>

  <!-- ============================================= -->
  <!-- BOTTOM-LEFT: SAD/WORRIED character            -->
  <!-- ============================================= -->
  <g id="sad">
    <!-- Main body -->
    <rect x="218" y="556" width="436" height="288" fill="url(#checker)"/>
    <!-- Right arm bump -->
    <rect x="654" y="700" width="24" height="72" fill="url(#checker)"/>
    <!-- Left arm hanging down (holding cheek) -->
    <rect x="218" y="700" width="60" height="60" fill="url(#checker)"/>
    <rect x="230" y="760" width="60" height="24" fill="url(#checker)"/>
    <rect x="242" y="784" width="60" height="24" fill="url(#checker)"/>
    <rect x="254" y="808" width="60" height="24" fill="url(#checker)"/>
    <!-- Legs -->
    <rect x="266" y="844" width="60" height="48" fill="url(#checker)"/>
    <rect x="546" y="844" width="60" height="48" fill="url(#checker)"/>

    <!-- Sweat drop -->
    <rect x="546" y="520" width="12" height="12" fill="#000"/>
    <rect x="534" y="520" width="24" height="24" fill="#fff"/>
    <rect x="534" y="532" width="24" height="12" fill="#fff"/>
    <rect x="534" y="520" width="12" height="12" fill="#000"/>
    <rect x="558" y="520" width="12" height="12" fill="#000"/>
    <rect x="522" y="532" width="12" height="24" fill="#000"/>
    <rect x="570" y="532" width="12" height="24" fill="#000"/>
    <rect x="534" y="556" width="36" height="12" fill="#000"/>
    <rect x="534" y="532" width="36" height="24" fill="#fff"/>

    <!-- Left worried eyebrow (angled up-left) -->
    <rect x="266" y="608" width="12" height="12" fill="#000"/>
    <rect x="278" y="620" width="12" height="12" fill="#000"/>
    <rect x="290" y="632" width="12" height="12" fill="#000"/>
    <rect x="302" y="644" width="12" height="12" fill="#000"/>

    <!-- Right worried eyebrow -->
    <rect x="374" y="644" width="12" height="12" fill="#000"/>
    <rect x="386" y="632" width="12" height="12" fill="#000"/>
    <rect x="398" y="620" width="12" height="12" fill="#000"/>
    <rect x="410" y="608" width="12" height="12" fill="#000"/>

    <!-- Left eye -->
    <rect x="290" y="668" width="24" height="36" fill="#000"/>

    <!-- Right eye -->
    <rect x="374" y="668" width="24" height="36" fill="#000"/>

    <!-- Wavy sad mouth -->
    <rect x="314" y="756" width="12" height="12" fill="#000"/>
    <rect x="326" y="744" width="12" height="12" fill="#000"/>
    <rect x="338" y="756" width="12" height="12" fill="#000"/>
    <rect x="350" y="744" width="12" height="12" fill="#000"/>
    <rect x="362" y="756" width="12" height="12" fill="#000"/>
    <rect x="374" y="744" width="12" height="12" fill="#000"/>
  </g>

  <!-- ============================================= -->
  <!-- BOTTOM-RIGHT: SHOCKED character               -->
  <!-- ============================================= -->
  <g id="shocked">
    <!-- Left arm raised -->
    <rect x="806" y="600" width="60" height="24" fill="url(#checker)"/>
    <rect x="806" y="576" width="24" height="24" fill="url(#checker)"/>
    <rect x="842" y="624" width="24" height="60" fill="url(#checker)"/>
    <!-- Right arm raised -->
    <rect x="1290" y="600" width="60" height="24" fill="url(#checker)"/>
    <rect x="1326" y="576" width="24" height="24" fill="url(#checker)"/>
    <rect x="1290" y="624" width="24" height="60" fill="url(#checker)"/>
    <!-- Main body -->
    <rect x="866" y="540" width="424" height="304" fill="url(#checker)"/>
    <!-- Legs -->
    <rect x="914" y="844" width="60" height="48" fill="url(#checker)"/>
    <rect x="1182" y="844" width="60" height="48" fill="url(#checker)"/>

    <!-- Left eye (big white circle with dot) -->
    <rect x="962" y="628" width="72" height="72" fill="#fff" stroke="#000" stroke-width="8"/>
    <rect x="990" y="656" width="16" height="16" fill="#000"/>

    <!-- Right eye -->
    <rect x="1122" y="628" width="72" height="72" fill="#fff" stroke="#000" stroke-width="8"/>
    <rect x="1150" y="656" width="16" height="16" fill="#000"/>

    <!-- Open shocked mouth -->
    <rect x="1050" y="720" width="60" height="72" fill="#000"/>
    <rect x="1038" y="732" width="12" height="48" fill="#000"/>
    <rect x="1110" y="732" width="12" height="48" fill="#000"/>
    <rect x="1050" y="708" width="60" height="12" fill="#000"/>
    <rect x="1050" y="792" width="60" height="12" fill="#000"/>
    <rect x="1062" y="732" width="36" height="48" fill="#000"/>

    <!-- Motion lines around head -->
    <!-- Top-left motion lines -->
    <rect x="782" y="530" width="36" height="12" fill="#000"/>
    <rect x="794" y="518" width="12" height="12" fill="#000"/>
    <rect x="806" y="506" width="12" height="12" fill="#000"/>

    <!-- Top-right motion lines -->
    <rect x="1338" y="530" width="36" height="12" fill="#000"/>
    <rect x="1350" y="518" width="12" height="12" fill="#000"/>
    <rect x="1338" y="506" width="12" height="12" fill="#000"/>

    <!-- Middle-left motion line -->
    <rect x="782" y="660" width="36" height="12" fill="#000"/>
    <rect x="770" y="672" width="12" height="12" fill="#000"/>
    <rect x="758" y="684" width="12" height="12" fill="#000"/>

    <!-- Middle-right motion line -->
    <rect x="1338" y="660" width="36" height="12" fill="#000"/>
    <rect x="1374" y="672" width="12" height="12" fill="#000"/>
    <rect x="1386" y="684" width="12" height="12" fill="#000"/>

    <!-- Bottom-left motion line -->
    <rect x="806" y="770" width="36" height="12" fill="#000"/>
    <rect x="794" y="782" width="12" height="12" fill="#000"/>
    <rect x="782" y="794" width="12" height="12" fill="#000"/>

    <!-- Bottom-right motion line -->
    <rect x="1314" y="770" width="36" height="12" fill="#000"/>
    <rect x="1350" y="782" width="12" height="12" fill="#000"/>
    <rect x="1362" y="794" width="12" height="12" fill="#000"/>
  </g>
</svg>
