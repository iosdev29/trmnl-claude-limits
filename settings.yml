name: Claude UNLMTD
strategy: webhook
description: >
  Shows your Claude Code usage against Anthropic's rolling limits — 5-hour
  session window plus the 7-day all-models, Sonnet, and Opus buckets.
  A local script on your Mac pushes the data; nothing inbound to the device.
  Each view also renders a pixel-art Claude mascot whose mood mirrors the
  worst bucket and whose idle animation advances one frame per refresh
  (see README §Mascot). The animation costs nothing extra — it rides the
  existing refresh_rate_seconds tick.
refresh_rate_seconds: 600
custom_fields:
  - key: claude_plan
    label: Claude plan (fallback)
    field_type: string
    description: >
      Used only when the push script can't read the plan tier from
      ~/.claude/.credentials.json. One of "Pro", "Max", "Team".
    default: Max
