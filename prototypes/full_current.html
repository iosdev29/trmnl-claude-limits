<style>
  :root {
    --screen-w: 800px; --screen-h: 480px;
    --pixel-ratio: 1; --dither-pixel-ratio: 1;
    --ui-scale: 1; --gap-scale: 1; --color-depth: 1;
    --gap-xsmall: 5px; --gap-small: 7px; --gap: 10px;
    --gap-medium: 16px; --gap-large: 20px; --gap-xlarge: 30px; --gap-xxlarge: 40px;
    --list-gap-small: 8px; --list-gap-large: 16px;
    --full-w: 780px; --full-h: 460px;
  }
  body {
    margin: 0; padding: 40px 20px;
    background: #0a0a0a; color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 { color: #fff; margin: 0 0 32px; font-weight: 700; font-size: 20px; text-align: center; }
  .stage {
    width: 828px; margin: 0 auto;
    background: #1a1a1a; border-radius: 22px; padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .screen-frame {
    width: 800px; height: 480px;
    background: #fff; color: #000;
    border-radius: 8px; overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .screen-body {
    flex: 1; padding: 24px 40px;
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }

  /* =====================================================================
     SIZING CONSTANTS — tune the layout by editing values here.
     ===================================================================== */
  :root {
    /* All px sizes are multiplied by --pixel-ratio so they scale
       correctly across TRMNL OG (1x) and higher-DPR frames. */
    --pr: var(--pixel-ratio, 1);

    /* Hero column (gauge + Session labels) — LEFT side of the row */
    --hero-col-width: calc(400px * var(--pr));

    /* Horizontal gap between the hero column and the stats column */
    --hero-stats-gap:  calc(30px  * var(--pr));

    /* Semicircle gauge */
    --gauge-height:    calc(300px * var(--pr));

    /* Pixel-art mascot overlaid on the gauge */
    --mascot-width:    calc(130px * var(--pr));
    --mascot-height:   calc(87px  * var(--pr));
    --mascot-top-inset: 32%;

    /* Stats column (right side) */
    --stats-col-inset:  calc(12px * var(--pr));   /* top + bottom breathing room */
    --stats-row-gap:    calc(24px * var(--pr));   /* vertical gap between the 3 stat rows */
    --stats-value-size: calc(72px * var(--pr));   /* big number size — % stays as-is */
  }

  /* Two-column row: gauge on the left, stats on the right */
  .hero-stats-row { gap: var(--hero-stats-gap); }

  /* Hero column layout */
  .hero-col { width: var(--hero-col-width); justify-content: space-evenly; }

  /* Gauge + mascot overlay */
  .gauge-wrap { position: relative; height: var(--gauge-height); }
  .gauge-mascot {
    position: absolute;
    top: var(--mascot-top-inset); left: 0; right: 0;
    display: flex; justify-content: center;
    pointer-events: none;
    z-index: 2;
  }
  .gauge-mascot svg { width: var(--mascot-width); height: var(--mascot-height); }

  /* Right column: three stat rows share the column height evenly */
  .stats-col {
    padding-top:    var(--stats-col-inset);
    padding-bottom: var(--stats-col-inset);
    gap: var(--stats-row-gap);
  }
  .stats-col > .item { flex: 1 1 0; min-height: 0; }

  /* Shrink only the big numbers inside the stats column; leave the % small size */
  .stats-col .value--xxxlarge { font-size: var(--stats-value-size); line-height: 1; }
</style>
</head>
