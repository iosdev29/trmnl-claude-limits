<style>
  :root {
    --screen-w: 800px; --screen-h: 480px;
    --pixel-ratio: 1; --dither-pixel-ratio: 1;
    --ui-scale: 1; --gap-scale: 1; --color-depth: 1;
    --gap-xsmall: 5px; --gap-small: 7px; --gap: 10px;
    --gap-medium: 16px; --gap-large: 20px; --gap-xlarge: 30px; --gap-xxlarge: 40px;
    --list-gap-small: 8px; --list-gap-large: 16px;
    --full-w: 780px; --full-h: 460px;
  }
  body {
    margin: 0; padding: 40px 20px;
    background: #0a0a0a; color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 { color: #fff; margin: 0 0 32px; font-weight: 700; font-size: 20px; text-align: center; }
  .stage {
    width: 828px; margin: 0 auto;
    background: #1a1a1a; border-radius: 22px; padding: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .screen-frame {
    width: 800px; height: 480px;
    background: #fff; color: #000;
    border-radius: 8px; overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .screen-body {
    flex: 1; padding: 24px 40px;
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }

  /* =====================================================================
     SIZING CONSTANTS — tune the layout by editing values here.
     ===================================================================== */
  :root {
    /* All px sizes are multiplied by --pixel-ratio so they scale
       correctly across TRMNL OG (1x) and higher-DPR frames. */
    --pr: var(--pixel-ratio, 1);

    /* Hero column (gauge + Session labels) — LEFT side of the row */
    --hero-col-width: calc(400px * var(--pr));

    /* Horizontal gap between the hero column and the stats column */
    --hero-stats-gap:  calc(30px  * var(--pr));

    /* Semicircle gauge */
    --gauge-height:    calc(300px * var(--pr));

    /* Pixel-art mascot overlaid on the gauge — all four moods share the
       same 768x512 viewBox, so a fixed width + height keeps them aligned. */
    --mascot-width:    calc(130px * var(--pr));
    --mascot-height:   calc(87px  * var(--pr));
    --mascot-top-inset: 32%;

    /* Stats column (right side) */
    --stats-row-gap:    calc(24px * var(--pr));   /* vertical gap between the 3 stat rows */
    --stats-value-size: calc(72px * var(--pr));   /* big number size — % stays as-is */
  }

  /* Two-column row: gauge on the left, stats on the right */
  .hero-stats-row { gap: var(--hero-stats-gap); }

  /* Hero column layout */
  .hero-col { width: var(--hero-col-width); justify-content: space-evenly; }

  /* Gauge + mascot overlay */
  .gauge-wrap { position: relative; height: var(--gauge-height); }
  .gauge-mascot {
    position: absolute;
    top: var(--mascot-top-inset); left: 0; right: 0;
    display: flex; justify-content: center;
    pointer-events: none;
    z-index: 2;
  }
  .gauge-mascot svg { width: var(--mascot-width); height: var(--mascot-height); }

  /* Right column: content-sized stat rows, vertically centered in the column */
  .stats-col {
    justify-content: center;
    gap: var(--stats-row-gap);
  }
  .stats-col > .item { flex: 0 0 auto; }

  /* Shrink only the big numbers inside the stats column; leave the % small size */
  .stats-col .value--xxxlarge { font-size: var(--stats-value-size); line-height: 1; }
</style>
</head>

<script type="text/javascript">
  (function () {
    // =====================================================================
    // GAUGE CONSTANTS — tune the semicircle gauge by editing values here.
    // =====================================================================
    var GAUGE = {
      START_ANGLE:         -150,
      END_ANGLE:            150,
      ARC_INNER_RADIUS:    "82%",
      ARC_BORDER_RADIUS:   "50%",
      TICK_PIXEL_INTERVAL:  40,
      DITHER_FILL_URL:     "https://trmnl.com/images/grayscale/gray-2.png",
      DITHER_TRACK_URL:    "https://trmnl.com/images/grayscale/gray-5.png",
      DITHER_TILE_SIZE:     12,
      LABEL_Y_OFFSET:       55,
      LABEL_FONT_SIZE:     "2.4em",
      LABEL_FONT_WEIGHT:   "600"
    };

    var score = 45;

    Highcharts.chart("gauge_session", {
      chart: { type: "gauge", animation: false, backgroundColor: "transparent", spacing: [0, 0, 0, 0] },
      title: { text: null },
      pane: {
        startAngle: GAUGE.START_ANGLE,
        endAngle:   GAUGE.END_ANGLE,
        background: { backgroundColor: "transparent", borderWidth: 0 }
      },
      plotOptions: {
        gauge: {
          animation: false,
          pivot: { backgroundColor: "transparent" },
          dial: { backgroundColor: "transparent", baseWidth: 0 }
        }
      },
      yAxis: {
        min: 0, max: 100,
        minorTickInterval: 0, tickColor: "#ffffff", tickLength: 0,
        tickPixelInterval: GAUGE.TICK_PIXEL_INTERVAL, tickWidth: 0, lineWidth: 0,
        title: { text: null },
        labels: { enabled: false },
        plotBands: [{
          from: 0.01, to: Math.max(score, 0.5),
          color: { pattern: { image: GAUGE.DITHER_FILL_URL, width: GAUGE.DITHER_TILE_SIZE, height: GAUGE.DITHER_TILE_SIZE } },
          innerRadius: GAUGE.ARC_INNER_RADIUS, borderRadius: GAUGE.ARC_BORDER_RADIUS
        }, {
          from: score + 0.5, to: 100,
          color: { pattern: { image: GAUGE.DITHER_TRACK_URL, width: GAUGE.DITHER_TILE_SIZE, height: GAUGE.DITHER_TILE_SIZE } },
          innerRadius: GAUGE.ARC_INNER_RADIUS, borderRadius: GAUGE.ARC_BORDER_RADIUS
        }]
      },
      series: [{
        name: "%",
        data: [score],
        dataLabels: {
          borderWidth: 0,
          y: GAUGE.LABEL_Y_OFFSET,
          format: "{y}%",
          style: {
            fontSize:   GAUGE.LABEL_FONT_SIZE,
            fontWeight: GAUGE.LABEL_FONT_WEIGHT,
            fontFamily: "inherit"
          }
        }
      }],
      credits: { enabled: false }
    });
  })();
